prompt:
  role: user
  content:
    description: "Migração incremental de dados entre duas instâncias do Chatwoot (chatwoot_dev1_db → origem / chatwoot004_dev1_db → destino) para consolidar chat.vya.digital (eliminada) em synchat.vya.digital (mantida), garantindo integridade referencial, remapeamento de IDs e zero exposição de dados sensíveis."
    specification:
      - project_name: "enterprise-chatwoot-migration"
      - response: "código python, com conexão em PostgreSQL, utilizando SQLAlchemy e Alembic para migração de banco de dados."
      - docstyle: "Documentar o código segundo padrão reStructuredText do Docstring, incluindo Doct test. (quando possível)"
      - workflow-objetivo: "objetivo.yaml → Copilot → objetivo-template.yaml → Copilot → mcp-questions.yaml → Copilot → generate .vscode/mcp.json, settings.json, tasks.json"
      - workflow-specify: "objetivo.yaml → speckit.constitution → speckit.clarify → speckit.plan → speckit.checklist → speckit.tasks → speckit.analyze → speckit.implement"
      - out-scope: "Não deve ser alterada nada em nenhum código do Chatwoot, esse projeto é totalmente independente."
      - rules:
          - Regras para migração:
              - "Validar se o Cliente está ativo nas duas bases"
              - "Caso o Cliente estja inativo na base destino, sobrepor todos os dados"
              - " Caso haja conflitos clientes ativos e demais informações chaves, gerar relatório detalhado para análise posterior"
          - "Todos os arquivos gerados devem ser armazenados nas devidas pastas, na raiz do projeto só os arquivos extremamente necessários"
          - "Códigos gerados devem seguir padrões de qualidade e estilo, com linting e formatação automática"
          - "Fluxo de trabalho deve ser guiado por prompts para GitHub Copilot"
          - "Configuração MCP deve ser gerada automaticamente baseada nas especificações"
          - "Sistema de versionamento e histórico deve rastrear todas as mudanças"
          - "Acessar o repositório do chatwoot `https://github.com/chatwoot/chatwoot` apenas como referência de schema e migrations — nenhum código do Chatwoot deve ser copiado ou alterado"
          - "No repositório chatwoot analisar todas as migrations do banco de dados para identificar a versão de cada instância e os dados a serem migrados"
          - "Utilizar Fabric Design Pattern em TODO o código — da camada de conexão aos migrators — para arquitetura organizada e modular, evitando código espaguete"
          - "Remapear IDs da origem para valores posteriores ao maior ID existente no destino, preservando todas as relações internas entre entidades"
          - "Migrar apenas as referências (URLs) de attachments S3 — não mover arquivos físicos no S3"
          - "Nenhum dado sensível (e-mails, nomes, conteúdo de mensagens, telefones) deve aparecer em stdout, logs de arquivo ou qualquer saída visível"
          - "A migração deve ser idempotente: re-execução não deve duplicar registros já migrados"
          - "Credenciais acessadas exclusivamente via .secrets/generate_erd.json — nunca versionadas nem impressas"
          - "Utilizar as melhores práticas de desenvolvimento de software, incluindo testes automatizados, documentação clara e manutenção de código"
          - "Utilizar as melhores práticas de segurança, incluindo a gestão segura de credenciais e a proteção contra vulnerabilidades comuns"
    folder_structure:
      - ".github - Agents, Workflows e ações para CI/CD (gerados automaticamente)"
      - ".git-hooks - Hooks personalizados para Git (gerados automaticamente)"
      - ".secrets - Armazenamento seguro de chaves e tokens (não versionado)"
      - ".specify - Configurações específicas do projeto (geradas automaticamente)"
      - ".vscode - Configurações VS Code e MCP (geradas automaticamente)"
      - "app - Código-fonte principal do projeto (estrutura específica por tipo)"
      - "docs - Documentação (gerada automaticamente)"
      - "docs/db_erd/chatwoot_dev1_db - Diagrama ERD do banco de dados do chatwoot_dev"
      - "docs/db_erd/chatwoot004_dev1_db - Diagrama ERD do banco de dados do chatwoot004_dev1_db"
      - "scripts - Scripts de automação inteligente"
      - "src - Código-fonte do projeto (estrutura específica por tipo)"
      - "test - Testes automatizados (framework baseado na linguagem)"
      - "tmp - Arquivos temporários e de backup (não versionados e removidos automaticamente no final da sessão)"
      - "objetivo.yaml - Especificação detalhada do projeto"
      - "objetivo-template.yaml - Especificação detalhada do projeto"
      - "mcp-questions.yaml - Configuração gerada pelo Copilot"
    expected_outcome:
      - migration_result: "100% dos dados de chatwoot_dev1_db migrados para chatwoot004_dev1_db com zero erros de FK, todas as conversas associadas a contacts e todas as mensagens associadas a conversas"
      - id_remapping: "Todos os IDs da origem remapeados para valores posteriores ao maior ID do destino, com relações internas preservadas"
      - validation: "Relatório de contagem de registros origem vs destino gerado ao final, confirmando integridade da migração"
      - security: "Nenhum dado sensível exposto em logs ou stdout em nenhuma etapa"
      - code_quality: "Código Python com Fabric Design Pattern, linting (ruff), formatação (black), documentação reStructuredText e testes unitários"
      - s3_handling: "Referências (URLs) de attachments migradas; arquivos físicos no S3 não movimentados"
      - rollback: "Backup de chatwoot004_dev1_db disponível; chatwoot_dev1_db não sofre alterações (somente leitura)"
    infrastructure:
      - "Servidor wfdb02.vya.digitasl hospeda as duas bases de dados PostgreSQL"
      - "A execução do código será feito a partir deste computador"
      - "As aplicações Chatwoot são containers Docker, hospedadas no servidor wf001.vya.digital"
    profile:
      - role: dba_architect
        skill_level: "expert"
        description: "Arquiteto de banco de dados especializado em PostgreSQL, SQLAlchemy e Alembic para migração de banco de dados."
      - role: dba_administrator
        skill_level: "expert"
        description: "Especialista em operações de banco de dados e administração de PostgreSQL."
      - role: system_architect
        skill_level: "expert"
        description: "Expert em design de sistemas complexos e arquitetura de software."
      - role: python_developer
        skill_level: "expert"
        description: "Especialista em DevOps e automação de workflows de desenvolvimento."
    features_to_implement:
      - "Conexão segura a dois bancos PostgreSQL via SQLAlchemy, lendo credenciais de .secrets/generate_erd.json"
      - "Inspeção automática do schema das duas instâncias e geração de diff de versões"
      - "Remapeamento de IDs: calcular offset (max_id_destino + 1) e aplicar em todas as FK relacionadas"
      - "Migração incremental de todas as tabelas do banco origem para o destino, na ordem correta de dependências (FK)"
      - "Preservação de integridade referencial entre accounts, contacts, conversations, messages, inboxes, teams, labels"
      - "Migração das URLs de referência a attachments S3 sem mover arquivos físicos"
      - "Sistema de log de execução com mascaramento de dados sensíveis (e-mails, nomes, conteúdos)"
      - "Idempotência: controle de estado para evitar duplicação em re-execuções"
      - "Relatório final de validação: contagem de registros origem vs. destino por tabela"
      - "Testes unitários para funções críticas (remapeamento de IDs, validação de FK, mascaramento de log)"
      - "Documentação reStructuredText com doctest em todos os módulos"
      - "Execução via script direto: python src/migrar.py"
    pending_tasks:
      - id: "D1"
        description: "Verificar versão exata do Chatwoot (schema_migrations) em chatwoot_dev1_db e chatwoot004_dev1_db"
        assignee: "Copilot"
        script: "scripts/check_chatwoot_versions.py"
        status: "resolvido"
        resolved_at: "2026-04-09"
        evidence: "schema_sha1 idêntico (da6b4a366d...). chatwoot_dev1_db: migration=20241217041352, total=252. chatwoot004_dev1_db: migration=20240820191716, total=255."
      - id: "D2"
        description: "Definir destino final de chatwoot_dev1_db após migração bem-sucedida (manter histórico, desativar ou congelar)"
        assignee: "yvesmarinho"
        status: "pendente"
